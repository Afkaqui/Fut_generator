name: fut_generador
description: "Generador de FUT para estudiantes UNHEVAL"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local storage
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0

  # PDF
  pdf: ^3.11.0
  printing: ^5.13.0

  # Navigation
  go_router: ^14.8.1

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  hive_ce_generator: ^1.6.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#003366"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
